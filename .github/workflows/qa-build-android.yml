#--------------------------------------------------------------------------------------------------
# qa-build-android.yml
#
# This file defines a CD workflow for testing the KidsIdKit App for Android using GitHub Actions.
# It is a GitHub Actions workflow file for building and testing a .NET project.
# It is triggered on pushes and pull requests to the QA branch.
# The workflow consists of a single job that runs on the latest MacOS environment.
# - Installs .NET 10.x (project build) .
# - Restores, builds, and deploys the specified project to Firebase.
#--------------------------------------------------------------------------------------------------

name: CD Build Android - QA

on:
  push:
    branches:
      - QA
  pull_request:
    branches:
      - main
 
jobs:
  build:
    name: 🚀 Build and Deploy Android App
    runs-on: macos-latest
    env:
      ProjectFile: KidsIdKit.Mobile/KidsIdKit.Mobile.csproj
      KeystoreFile: MissingChildrenMN.ks
      KestoreAlias: ${{secrets.ANDROID_KEYSTORE_ALIAS}}
      KeystorePassword: ${{secrets.ANDROID_KEYSTORE_PASSWORD}}
      BuildConfiguration: Release
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧰 Setup .NET SDK (10.x)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui
      
      - name: 🧾 Show .NET info
        run: dotnet --info

      - name: 📦 Restore project dependencies and tools
        run: dotnet restore $ProjectFile

      - name: Write keystore file
        run: echo "${{secrets.ANDROID_KEYSTORE_BASE64}}" | base64 --decode > KidsIdKit.Mobile/$KeystoreFile
  
      - name: Run number
        run: echo ${{ github.run_number }}

      - name: Build Android project 🔨
        run: >
          dotnet publish $ProjectFile 
          -f net10.0-android
          --configuration $BuildConfiguration
          --no-restore
          --output Artifacts/Android
          /p:AndroidPackageFormat=aab
          /p:ApplicationDisplayVersion=1.0.${{ github.run_number }}
          /p:ApplicationVersion=${{ github.run_number }}
          /p:AndroidSigningKeyPass=$KeystorePassword
          /p:AndroidSigningStorePass=$KeystorePassword
          /p:AndroidSigningKeystore=$KeystoreFile
          /p:AndroidSigningKeyAlias=$KestoreAlias
          /p:AndroidKeyStore=True 

      - name: list files
        run: ls -lR Artifacts/Android

      - uses: actions/upload-artifact@v6
        with:
          name: Android-aab
          path: Artifacts/Android/

      - name: Upload Android App Bundle to Google Play Store
        id: upload_aab
        uses: KevinRohn/github-action-upload-play-store@v1.0.2
        with:
          service_account_json: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          package_name: "com.missingchildrenmn.kidsidkit"
          aab_file_path: "Artifacts/Android/com.missingchildrenmn.kidsidkit-Signed.aab"
          track: "internal"
          release_status: "draft"