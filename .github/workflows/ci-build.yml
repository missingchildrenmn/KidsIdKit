#--------------------------------------------------------------------------------------------------
# ci-build.yml
#
# This file defines a CI/CD workflow for building and testing a .NET project using GitHub Actions.
# It is a GitHub Actions workflow file for building and testing a .NET project.
# It is triggered on pushes and pull requests to the main branch.
# The workflow consists of a single job that runs on the latest Ubuntu environment.
# - Installs both .NET 9.x (project build) and 8.x (tool runtime compatibility).
# - Restores, builds, and tests the specified project.
#--------------------------------------------------------------------------------------------------

name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: 🚀 Build and Test .NET Project
    runs-on: ubuntu-latest
    outputs:
      run_maui: ${{ steps.check_files.outputs.run_maui }}

    env:
      ProjectFile: KidsIdKit.Core/KidsIdKit.Core.csproj
      TestProjectFile: KidsIdKit.Tests/KidsIdKit.Tests.csproj
      WebProjectFile: KidsIdKit.Web/KidsIdKit.Web.csproj

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Install both SDKs:
      # - 10.0.x to build net10.0 projects
      # - 8.0.x so DartSassBuilder (targets Microsoft.NETCore.App 8.0) can run
      - name: 🧰 Setup .NET SDKs (10.x, 8.x)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: 🧾 Show .NET info
        run: dotnet --info

      - name: 📦 Restore project dependencies and tools
        run: dotnet restore $ProjectFile

      - name: Build project and all of its dependencies 🔨
        run: dotnet build $ProjectFile --configuration Release --no-restore

      - name: 📦 Restore web project dependencies and tools
        run: dotnet restore $WebProjectFile

      - name: Build web project and all of its dependencies 🌐
        run: dotnet build $WebProjectFile --configuration Release --no-restore

      - name: Run tests 🧪
        run: dotnet test $TestProjectFile --verbosity normal

      - name: check for MAUI modified files
        id: check_files
        shell: bash
        run: |
          echo "=============== list modified files ==============="
          git diff --name-only HEAD^ HEAD
      
          echo "========== check paths of modified files =========="
          git diff --name-only HEAD^ HEAD > files.txt
          # Set default once before checking individual files
          echo "run_maui=false" >> $GITHUB_OUTPUT
          while IFS= read -r file
          do
            echo $file
            if [[ $file = KidsIdKit.Mobile/* ]]; then
              echo "found a MAUI modified file."
              echo "run_maui=true" >> $GITHUB_OUTPUT
              break
            fi
          done < files.txt

  Build_CSLA_MAUI:
    name: 🚀 Build MAUI Project
    needs: build
    if: needs.build.outputs.run_maui == 'true'
    runs-on: macos-latest

    env:
      MobileProjectFile: KidsIdKit.Mobile/KidsIdKit.Mobile.csproj
      CoreProjectFile: KidsIdKit.Core/KidsIdKit.Core.csproj
      BuildConfiguration: Debug

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🧰 Setup .NET SDKs (10.x)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: | 
            10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: 🔨 Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Add Apple Certificate to Keychain
        uses: apple-actions/import-codesign-certs@v3
        with: 
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}

      - name: Add Apple Provisioning Profile
        uses: nickwph/apple-provisioning-profile-action@v1
        with:
          profile-base64: ${{ secrets.APPLE_DEVELOPER_PROVISIONING_BASE64 }}

      - name: 🧾 Show .NET info
        run: dotnet --info

      - name: 📦 Restore project dependencies and tools
        run: dotnet restore $MobileProjectFile

      - name: Restore Ionic files
        run: npm install
        working-directory: ./KidsIdKit.Mobile/npm_modules

      - name: Write Ionic files
        run: npm run copyIonicMac
        working-directory: ./KidsIdKit.Mobile/npm_modules
        
      - name: Build Core project 🔨
        run: dotnet build $CoreProjectFile -f net10.0 --configuration $BuildConfiguration --no-restore

      - name: Build Android project 🔨
        run: dotnet build $MobileProjectFile -f net10.0-android --configuration $BuildConfiguration --no-restore

      - name: Build iOS project 🔨
        run: dotnet build $MobileProjectFile -f net10.0-ios --configuration $BuildConfiguration --no-restore
