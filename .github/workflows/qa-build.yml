#--------------------------------------------------------------------------------------------------
# qa-build-android.yml
#
# This file defines a CD workflow for the KidsIdKit App for Android using GitHub Actions.
# It builds and signs the .NET MAUI Android project, produces an Android App Bundle (AAB),
# and uploads the bundle to the Google Play Store (internal track) as a draft release.
# The workflow is triggered on pushes to the QA branch.
# The workflow consists of a single job that runs on the latest macOS environment and:
# - Installs .NET 10.x and the MAUI workload.
# - Restores dependencies, publishes the Android AAB artifact, and uploads it to Google Play.
#--------------------------------------------------------------------------------------------------

name: CD Build Android - QA

on:
  push:
    branches:
      - QA
  workflow_dispatch:

jobs:
  build:
    name: đźš€ Build and Deploy Android App
    runs-on: macos-latest
    env:
      ProjectFile: KidsIdKit.Mobile/KidsIdKit.Mobile.csproj
      CoreProjectFile: KidsIdKit.Core/KidsIdKit.Core.csproj
      KeystoreFile: MissingChildrenMN.ks
      KeystoreAlias: ${{secrets.ANDROID_KEYSTORE_ALIAS}}
      KeystorePassword: ${{secrets.ANDROID_KEYSTORE_PASSWORD}}
      BuildConfiguration: Release
    steps:
      - name: â¬‡ď¸Ź Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: đź§° Setup .NET SDK (10.x)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui
      
      - name: đź§ľ Show .NET info
        run: dotnet --info

      - name: đź“¦ Restore project dependencies and tools
        run: dotnet restore $ProjectFile

      - name: Restore Ionic files
        run: npm install
        working-directory: ./KidsIdKit.Mobile/npm_modules

      - name: Write Ionic files
        run: npm run copyIonicMac
        working-directory: ./KidsIdKit.Mobile/npm_modules

      - name: Write keystore file
        run: echo "${{secrets.ANDROID_KEYSTORE_BASE64}}" | base64 -D > KidsIdKit.Mobile/$KeystoreFile

      - name: Build Core project đź”¨
        run: dotnet build $CoreProjectFile -f net10.0 --configuration $BuildConfiguration --no-restore

      - name: Build Android project đź”¨
        run: >
          dotnet publish $ProjectFile 
          -f net10.0-android
          --configuration $BuildConfiguration
          --no-restore
          --output Artifacts/Android
          /p:AndroidPackageFormat=aab
          /p:ApplicationDisplayVersion=1.0.${{ github.run_number }}
          /p:ApplicationVersion=${{ github.run_number }}
          /p:AndroidSigningKeyPass=$KeystorePassword
          /p:AndroidSigningStorePass=$KeystorePassword
          /p:AndroidSigningKeystore=$KeystoreFile
          /p:AndroidSigningKeyAlias=$KeystoreAlias
          /p:AndroidKeyStore=True

      - uses: actions/upload-artifact@v6
        with:
          name: Android-aab
          path: Artifacts/Android/

      - name: Upload Android App Bundle to Google Play Store
        id: upload_aab
        uses: KevinRohn/github-action-upload-play-store@v1.0.2
        with:
          service_account_json: ${{ secrets.ANDROID_PLAY_SERVICE_ACCOUNT_JSON }}
          package_name: "com.missingchildrenmn.kidsidkit"
          aab_file_path: "Artifacts/Android/com.missingchildrenmn.kidsidkit-Signed.aab"
          track: "internal"
          release_status: "draft"